<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messagerie</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #2563eb; --primary-light: #dbeafe;
            --bg: #f1f5f9; --sidebar: #ffffff; --card: #ffffff;
            --border: #e2e8f0; --text: #1e293b; --text-muted: #64748b;
            --danger: #ef4444; --success: #22c55e;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header { background: var(--primary); color: white; padding: 0 16px; height: 52px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
        header h1 { font-size: 18px; font-weight: 700; }
        #header-right { display: flex; align-items: center; gap: 12px; font-size: 14px; }
        #notif-btn { background: rgba(255,255,255,.2); border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        #notif-btn:hover { background: rgba(255,255,255,.3); }
        #notif-badge { background: #ef4444; color: white; border-radius: 10px; padding: 1px 6px; font-size: 11px; font-weight: 700; display: none; }

        /* Layout */
        #layout { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
        #user-panel { padding: 12px; border-bottom: 1px solid var(--border); }
        #user-panel h3 { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
        .row { display: flex; gap: 6px; margin-top: 6px; }
        .row input { flex: 1; }

        /* Form controls */
        select, input[type=text] { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; color: var(--text); background: var(--bg); }
        select:focus, input:focus { outline: none; border-color: var(--primary); }

        /* Buttons */
        .btn { padding: 7px 12px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .15s; white-space: nowrap; }
        .btn:hover { opacity: .85; }
        .btn:disabled { opacity: .4; cursor: default; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger  { background: var(--danger); color: white; }
        .btn-ghost   { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
        .btn-success { background: var(--success); color: white; }
        .btn-sm { padding: 4px 8px; font-size: 12px; }

        /* Tabs */
        #tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* Sidebar content */
        #tab-content { flex: 1; overflow-y: auto; }
        .tab-pane { display: none; padding: 8px; }
        .tab-pane.active { display: block; }
        .section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; padding: 8px 4px 4px; }

        /* List items */
        .list-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-radius: 8px; cursor: pointer; margin-bottom: 2px; }
        .list-item:hover { background: var(--bg); }
        .list-item.active { background: var(--primary-light); }
        .list-item-name { font-size: 14px; font-weight: 500; }
        .list-item-sub { font-size: 12px; color: var(--text-muted); }
        .list-item-actions { display: flex; gap: 4px; flex-shrink: 0; }
        #add-friend-section { padding: 8px 4px; border-top: 1px solid var(--border); margin-top: 4px; }

        /* Main */
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #chat-placeholder { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); gap: 8px; }
        #chat-view { flex: 1; display: none; flex-direction: column; overflow: hidden; }

        /* Chat header */
        #chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--card); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        #chat-title { font-size: 16px; font-weight: 600; }

        /* Messages */
        #messages-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .msg { display: flex; flex-direction: column; max-width: 70%; }
        .msg.own   { align-self: flex-end;   align-items: flex-end; }
        .msg.other { align-self: flex-start; align-items: flex-start; }
        .msg-sender { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
        .msg-bubble { padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-break: break-word; }
        .msg.own   .msg-bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg.other .msg-bubble { background: #f1f5f9; color: var(--text); border-bottom-left-radius: 4px; }
        .msg-bubble.deleted { opacity: .5; font-style: italic; }
        .msg-edited { font-size: 11px; opacity: .7; }
        .msg-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .msg-actions { display: none; gap: 4px; margin-top: 4px; }
        .msg:hover .msg-actions { display: flex; }
        .edit-input { padding: 6px 10px; border: 1px solid var(--primary); border-radius: 6px; font-size: 14px; margin-top: 4px; width: 260px; }

        /* Files panel */
        #files-panel { border-top: 1px solid var(--border); background: var(--card); max-height: 180px; overflow-y: auto; display: none; }
        #files-panel-header { padding: 8px 16px; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        #files-list { padding: 0 16px 8px; display: flex; flex-wrap: wrap; gap: 8px; }
        .file-item { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 13px; }
        .file-name { font-weight: 500; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-size { font-size: 11px; color: var(--text-muted); }

        /* Input area */
        #input-area { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--card); display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        #message-input { flex: 1; padding: 9px 14px; border: 1px solid var(--border); border-radius: 20px; font-size: 14px; background: var(--bg); }
        #message-input:focus { outline: none; border-color: var(--primary); }

        /* Notifications overlay */
        #notif-overlay { position: fixed; top: 52px; right: 0; width: 320px; background: var(--card); border-left: 1px solid var(--border); height: calc(100vh - 52px); display: none; flex-direction: column; z-index: 100; box-shadow: -4px 0 16px rgba(0,0,0,.1); }
        #notif-overlay.open { display: flex; }
        #notif-overlay-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #notif-overlay-header h3 { font-size: 15px; font-weight: 600; }
        #notif-items { flex: 1; overflow-y: auto; padding: 8px; }
        .notif-item { padding: 10px; border-radius: 8px; background: var(--bg); margin-bottom: 6px; font-size: 13px; }
        .notif-type { font-weight: 600; font-size: 11px; color: var(--primary); text-transform: uppercase; }
        .notif-payload { color: var(--text); margin-top: 2px; }
        .notif-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        #notif-footer { padding: 10px 16px; border-top: 1px solid var(--border); }

        /* Toast */
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; z-index: 9999; animation: fadeIn .2s ease; pointer-events: none; }
        .toast-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .toast-success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .toast-info    { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .empty { text-align: center; color: var(--text-muted); font-size: 13px; padding: 16px 8px; }
    </style>
</head>
<body>

<header>
    <h1>💬 Messagerie</h1>
    <div id="header-right">
        <span id="current-user-display">Non connecté</span>
        <button id="notif-btn" onclick="toggleNotifications()">
            🔔 <span id="notif-badge">0</span>
        </button>
    </div>
</header>

<div id="layout">
    <div id="sidebar">
        <div id="user-panel">
            <h3>Utilisateur actif</h3>
            <select id="user-select" onchange="selectUser(this.value)">
                <option value="">Sélectionner…</option>
            </select>
            <div class="row">
                <input type="text" id="new-user-name" placeholder="Nouveau nom…" onkeydown="if(event.key==='Enter') createUser()">
                <button class="btn btn-primary" onclick="createUser()">Créer</button>
            </div>
        </div>

        <div id="tabs">
            <button class="tab-btn active" onclick="showTab('friends')">👥 Amis</button>
            <button class="tab-btn" onclick="showTab('convs')">💬 Discussions</button>
        </div>

        <div id="tab-content">
            <div id="tab-friends" class="tab-pane active">
                <div class="section-title">Mes amis</div>
                <div id="friends-list"><div class="empty">Aucun ami</div></div>

                <div class="section-title" style="margin-top:4px">Demandes reçues</div>
                <div id="pending-list"><div class="empty">Aucune demande</div></div>

                <div id="add-friend-section">
                    <div class="section-title">Ajouter un ami</div>
                    <div class="row">
                        <select id="add-friend-select" style="flex:1"><option value="">Choisir…</option></select>
                        <button class="btn btn-primary" onclick="sendFriendRequest()">+</button>
                    </div>
                </div>
            </div>

            <div id="tab-convs" class="tab-pane">
                <div class="section-title">Discussions</div>
                <div id="conv-list"><div class="empty">Aucune discussion</div></div>
            </div>
        </div>
    </div>

    <div id="main">
        <div id="chat-placeholder">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.25">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <p style="font-size:16px;font-weight:500">Sélectionnez une discussion</p>
            <p style="font-size:13px">Ajoutez un ami pour commencer</p>
        </div>

        <div id="chat-view">
            <div id="chat-header">
                <div>
                    <div id="chat-title"></div>
                    <div id="chat-sub" style="font-size:12px;color:var(--text-muted)"></div>
                </div>
                <button class="btn btn-ghost btn-sm" onclick="toggleFiles()">📎 Fichiers</button>
            </div>

            <div id="messages-container"></div>

            <div id="files-panel">
                <div id="files-panel-header">
                    <span>Fichiers partagés</span>
                    <label class="btn btn-primary btn-sm" style="cursor:pointer">
                        ＋ Envoyer un fichier
                        <input type="file" id="file-input" style="display:none" onchange="uploadFile(this)">
                    </label>
                </div>
                <div id="files-list"></div>
            </div>

            <div id="input-area">
                <input type="text" id="message-input" placeholder="Écrivez un message… (Entrée pour envoyer)" onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="btn btn-primary" onclick="sendMessage()">Envoyer</button>
            </div>
        </div>
    </div>
</div>

<div id="notif-overlay">
    <div id="notif-overlay-header">
        <h3>🔔 Notifications</h3>
        <button class="btn btn-ghost btn-sm" onclick="toggleNotifications()">✕</button>
    </div>
    <div id="notif-items"><div class="empty">Aucune notification</div></div>
    <div id="notif-footer">
        <button class="btn btn-ghost" style="width:100%" onclick="markAllRead()">Tout marquer comme lu</button>
    </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const S = { user: null, users: [], friends: [], pendingReceived: [], conversations: [], convId: null, convOther: null, pollTimer: null };

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(method, path, body) {
    const opts = { method, headers: {} };
    if (body !== undefined) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    const res = await fetch(path, opts);
    if (!res.ok) {
        let msg = `Erreur HTTP ${res.status}`;
        try { const j = await res.json(); msg = j.message || j.error || msg; } catch {}
        throw new Error(msg);
    }
    const ct = res.headers.get('content-type') || '';
    return ct.includes('application/json') ? res.json() : null;
}
const GET   = p    => api('GET',    p);
const POST  = (p,b) => api('POST',   p, b);
const PATCH = (p,b) => api('PATCH',  p, b);
const DEL   = p    => api('DELETE', p);

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtSize(b) {
    return b < 1024 ? b + ' o' : b < 1048576 ? (b/1024).toFixed(1) + ' Ko' : (b/1048576).toFixed(1) + ' Mo';
}
function fmtTime(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

// ── Users ─────────────────────────────────────────────────────────────────────
async function loadUsers() {
    S.users = await GET('/api/users');
    const sel = document.getElementById('user-select');
    const cur = sel.value;
    sel.innerHTML = '<option value="">Sélectionner…</option>';
    S.users.forEach(u => {
        const o = document.createElement('option');
        o.value = u.id; o.textContent = u.name;
        if (String(u.id) === cur) o.selected = true;
        sel.appendChild(o);
    });
    renderAddFriendSelect();
}

async function createUser() {
    const inp = document.getElementById('new-user-name');
    const name = inp.value.trim();
    if (!name) { toast('Entrez un nom', 'error'); return; }
    try {
        await POST('/api/users', { name });
        inp.value = '';
        await loadUsers();
        toast(`Utilisateur "${name}" créé`, 'success');
    } catch(e) { toast(e.message, 'error'); }
}

async function selectUser(id) {
    if (!id) { S.user = null; document.getElementById('current-user-display').textContent = 'Non connecté'; return; }
    S.user = S.users.find(u => String(u.id) === String(id));
    document.getElementById('current-user-display').textContent = `👤 ${S.user.name}`;
    clearPoll();
    S.convId = null; S.convOther = null;
    document.getElementById('chat-placeholder').style.display = '';
    document.getElementById('chat-view').style.display = 'none';
    await Promise.all([loadFriends(), loadConversations(), loadNotifications()]);
    startPoll();
}

// ── Friends ───────────────────────────────────────────────────────────────────
async function loadFriends() {
    if (!S.user) return;
    [S.friends, S.pendingReceived] = await Promise.all([
        GET(`/api/friendships/friends/${S.user.id}`).catch(() => []),
        GET(`/api/friendships/received/${S.user.id}`).catch(() => []),
    ]);
    renderFriends();
    renderAddFriendSelect();
}

function otherUser(f) { return f.fromUser.id === S.user.id ? f.toUser : f.fromUser; }

function renderFriends() {
    const fl = document.getElementById('friends-list');
    fl.innerHTML = S.friends.length
        ? S.friends.map(f => {
            const u = otherUser(f);
            return `<div class="list-item" onclick="openConvWith(${u.id})">
                <div><div class="list-item-name">${escHtml(u.name)}</div></div>
                <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openConvWith(${u.id})">💬</button>
            </div>`;
        }).join('')
        : '<div class="empty">Aucun ami</div>';

    const pl = document.getElementById('pending-list');
    pl.innerHTML = S.pendingReceived.length
        ? S.pendingReceived.map(f => `
            <div class="list-item">
                <div><div class="list-item-name">${escHtml(f.fromUser.name)}</div><div class="list-item-sub">En attente</div></div>
                <div class="list-item-actions">
                    <button class="btn btn-success btn-sm" onclick="acceptFriend(${f.id})">✓</button>
                    <button class="btn btn-danger btn-sm" onclick="declineFriend(${f.id})">✗</button>
                </div>
            </div>`).join('')
        : '<div class="empty">Aucune demande</div>';
}

function renderAddFriendSelect() {
    const sel = document.getElementById('add-friend-select');
    sel.innerHTML = '<option value="">Choisir…</option>';
    if (!S.user) return;
    const knownIds = new Set([S.user.id, ...S.friends.map(f => otherUser(f).id), ...S.pendingReceived.map(f => f.fromUser.id)]);
    S.users.filter(u => !knownIds.has(u.id)).forEach(u => {
        const o = document.createElement('option'); o.value = u.id; o.textContent = u.name; sel.appendChild(o);
    });
}

async function sendFriendRequest() {
    if (!S.user) { toast('Sélectionnez un utilisateur', 'error'); return; }
    const toId = document.getElementById('add-friend-select').value;
    if (!toId) { toast('Choisissez un utilisateur', 'error'); return; }
    try {
        await POST('/api/friendships/send', { fromUserId: S.user.id, toUserId: Number(toId) });
        toast('Demande envoyée !', 'success');
        await loadFriends();
    } catch(e) { toast(e.message, 'error'); }
}

async function acceptFriend(id) {
    try {
        await PATCH(`/api/friendships/${id}/accept`);
        toast('Demande acceptée !', 'success');
        await Promise.all([loadFriends(), loadConversations()]);
    } catch(e) { toast(e.message, 'error'); }
}

async function declineFriend(id) {
    try {
        await PATCH(`/api/friendships/${id}/decline`);
        toast('Demande déclinée', 'info');
        await loadFriends();
    } catch(e) { toast(e.message, 'error'); }
}

// ── Conversations ─────────────────────────────────────────────────────────────
async function loadConversations() {
    if (!S.user) return;
    S.conversations = await GET(`/api/conversations/user/${S.user.id}`).catch(() => []);
    renderConversations();
}

function renderConversations() {
    const el = document.getElementById('conv-list');
    el.innerHTML = S.conversations.length
        ? S.conversations.map(c => {
            const other = c.userA.id === S.user.id ? c.userB : c.userA;
            return `<div class="list-item ${c.id === S.convId ? 'active' : ''}" onclick="openConversation(${c.id}, ${c.userA.id}, ${c.userB.id})">
                <div class="list-item-name">${escHtml(other.name)}</div>
            </div>`;
        }).join('')
        : '<div class="empty">Aucune discussion</div>';
}

async function openConvWith(userId) {
    if (!S.user) return;
    showTab('convs');
    try {
        const conv = await POST('/api/conversations/get-or-create', { userAId: S.user.id, userBId: userId });
        await loadConversations();
        await openConversation(conv.id, conv.userA.id, conv.userB.id);
    } catch(e) { toast(e.message, 'error'); }
}

async function openConversation(id, userAId, userBId) {
    if (!S.user) return;
    S.convId = id;
    const otherId = userAId === S.user.id ? userBId : userAId;
    S.convOther = S.users.find(u => u.id === otherId) || { id: otherId, name: 'Utilisateur #' + otherId };
    document.getElementById('chat-placeholder').style.display = 'none';
    document.getElementById('chat-view').style.display = 'flex';
    document.getElementById('chat-title').textContent = S.convOther.name;
    document.getElementById('chat-sub').textContent = `Conversation #${id}`;
    document.getElementById('files-panel').style.display = 'none';
    renderConversations();
    await Promise.all([loadMessages(), loadFiles()]);
}

// ── Messages ──────────────────────────────────────────────────────────────────
async function loadMessages() {
    if (!S.convId) return;
    const msgs = await GET(`/api/messages/conversation/${S.convId}`).catch(() => []);
    renderMessages(msgs);
}

function renderMessages(msgs) {
    const el = document.getElementById('messages-container');
    if (!msgs.length) {
        el.innerHTML = '<div class="empty" style="margin-top:40px">Aucun message. Commencez !</div>';
        return;
    }
    el.innerHTML = msgs.map(m => {
        const own = m.sender.id === S.user.id;
        let content = escHtml(m.content || '');
        let bCls = 'msg-bubble';
        if (m.deleted) { content = '🗑 Message supprimé'; bCls += ' deleted'; }
        const edited = m.edited && !m.deleted ? ' <span class="msg-edited">(modifié)</span>' : '';
        const actions = own && !m.deleted
            ? `<div class="msg-actions">
                <button class="btn btn-ghost btn-sm" onclick="startEdit(${m.id})">✏️ Modifier</button>
                <button class="btn btn-danger btn-sm" onclick="deleteMsg(${m.id})">🗑 Supprimer</button>
               </div>`
            : '';
        return `<div class="msg ${own ? 'own' : 'other'}" id="msg-${m.id}" data-content="${escHtml(m.content || '')}">
            ${!own ? `<div class="msg-sender">${escHtml(m.sender.name)}</div>` : ''}
            <div class="${bCls}" id="bubble-${m.id}">${content}${edited}</div>
            ${actions}
            <div class="msg-time">${fmtTime(m.createdAt)}</div>
        </div>`;
    }).join('');
    el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
    if (!S.user || !S.convId) return;
    const inp = document.getElementById('message-input');
    const content = inp.value.trim();
    if (!content) return;
    try {
        await POST('/api/messages/send', { conversationId: S.convId, senderId: S.user.id, content });
        inp.value = '';
        await loadMessages();
    } catch(e) { toast(e.message, 'error'); }
}

function startEdit(id) {
    const msgEl = document.getElementById(`msg-${id}`);
    const bubble = document.getElementById(`bubble-${id}`);
    if (msgEl.querySelector('.edit-input')) return;
    const cur = msgEl.dataset.content || '';
    bubble.style.display = 'none';
    const inp = document.createElement('input');
    inp.className = 'edit-input'; inp.value = cur; inp.placeholder = 'Nouveau contenu…';
    bubble.after(inp);
    inp.focus();
    inp.onkeydown = async e => {
        if (e.key === 'Enter') { await saveEdit(id, inp.value.trim()); }
        if (e.key === 'Escape') { inp.remove(); bubble.style.display = ''; }
    };
}

async function saveEdit(id, content) {
    if (!content) { toast('Le contenu ne peut pas être vide', 'error'); return; }
    try {
        await PATCH(`/api/messages/${id}`, { content });
        await loadMessages();
        toast('Message modifié', 'success');
    } catch(e) { toast(e.message, 'error'); }
}

async function deleteMsg(id) {
    if (!confirm('Supprimer ce message ?')) return;
    try {
        await DEL(`/api/messages/${id}`);
        await loadMessages();
        toast('Message supprimé', 'info');
    } catch(e) { toast(e.message, 'error'); }
}

// ── Files ─────────────────────────────────────────────────────────────────────
async function loadFiles() {
    if (!S.convId) return;
    const files = await GET(`/api/files/conversation/${S.convId}`).catch(() => []);
    renderFiles(files);
}

function renderFiles(files) {
    const active = files.filter(f => !f.deleted);
    const el = document.getElementById('files-list');
    el.innerHTML = active.length
        ? active.map(f => {
            const canDel = f.sender.id === S.user.id;
            return `<div class="file-item">
                <span>📄</span>
                <div>
                    <div class="file-name" title="${escHtml(f.originalName)}">${escHtml(f.originalName)}</div>
                    <div class="file-size">${fmtSize(f.size)}</div>
                </div>
                <a class="btn btn-ghost btn-sm" href="/api/files/${f.id}/download" download="${escHtml(f.originalName)}">⬇</a>
                ${canDel ? `<button class="btn btn-danger btn-sm" onclick="deleteFile(${f.id})">🗑</button>` : ''}
            </div>`;
        }).join('')
        : '<div class="empty">Aucun fichier partagé</div>';
}

function toggleFiles() {
    const p = document.getElementById('files-panel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
    if (p.style.display !== 'none') loadFiles();
}

async function uploadFile(input) {
    if (!S.user || !S.convId || !input.files.length) return;
    const form = new FormData();
    form.append('file', input.files[0]);
    form.append('conversationId', S.convId);
    form.append('senderId', S.user.id);
    try {
        const res = await fetch('/api/files/upload', { method: 'POST', body: form });
        if (!res.ok) { const j = await res.json(); throw new Error(j.message || 'Erreur upload'); }
        input.value = '';
        await loadFiles();
        toast('Fichier envoyé !', 'success');
    } catch(e) { toast(e.message, 'error'); }
}

async function deleteFile(id) {
    if (!confirm('Supprimer ce fichier ?')) return;
    try {
        await DEL(`/api/files/${id}`);
        await loadFiles();
        toast('Fichier supprimé', 'info');
    } catch(e) { toast(e.message, 'error'); }
}

// ── Notifications ─────────────────────────────────────────────────────────────
const NOTIF_LABELS = {
    FRIEND_REQUEST_RECEIVED: '👋 Demande d\'ami reçue',
    FRIEND_REQUEST_ACCEPTED: '✅ Demande acceptée',
    FRIEND_REQUEST_DECLINED: '❌ Demande déclinée',
    MESSAGE_RECEIVED: '💬 Nouveau message',
    MESSAGE_EDITED: '✏️ Message modifié',
    MESSAGE_DELETED: '🗑 Message supprimé',
    FILE_RECEIVED: '📎 Nouveau fichier',
    FILE_DELETED: '🗑 Fichier supprimé',
};

async function loadNotifications() {
    if (!S.user) return;
    const notifs = await GET(`/api/notifications/unread/${S.user.id}`).catch(() => []);
    const badge = document.getElementById('notif-badge');
    badge.textContent = notifs.length;
    badge.style.display = notifs.length ? 'inline' : 'none';
    const el = document.getElementById('notif-items');
    el.innerHTML = notifs.length
        ? notifs.map(n => `<div class="notif-item">
            <div class="notif-type">${NOTIF_LABELS[n.type] || n.type}</div>
            <div class="notif-payload">${escHtml(n.payload || '')}</div>
            <div class="notif-time">${fmtTime(n.createdAt)}</div>
          </div>`).join('')
        : '<div class="empty">Aucune notification</div>';
}

function toggleNotifications() {
    document.getElementById('notif-overlay').classList.toggle('open');
    if (document.getElementById('notif-overlay').classList.contains('open')) loadNotifications();
}

async function markAllRead() {
    if (!S.user) return;
    try {
        await POST(`/api/notifications/mark-all-read/${S.user.id}`);
        await loadNotifications();
        toast('Notifications lues', 'info');
    } catch(e) { toast(e.message, 'error'); }
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function showTab(name) {
    ['friends','convs'].forEach((t, i) => {
        document.querySelectorAll('.tab-btn')[i].classList.toggle('active', t === name);
        document.getElementById(`tab-${t}`).classList.toggle('active', t === name);
    });
}

// ── Poll ──────────────────────────────────────────────────────────────────────
function startPoll() {
    clearPoll();
    S.pollTimer = setInterval(async () => {
        await loadNotifications();
        if (S.convId) await loadMessages();
    }, 3000);
}
function clearPoll() { if (S.pollTimer) { clearInterval(S.pollTimer); S.pollTimer = null; } }

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
    await loadUsers();
    if (S.users.length) {
        const sel = document.getElementById('user-select');
        sel.value = S.users[0].id;
        await selectUser(String(S.users[0].id));
    }
}
init();
</script>
